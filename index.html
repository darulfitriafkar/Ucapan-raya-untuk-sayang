<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Hari Raya 🌙</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#2e7d32; /* hijau pandan */
    color:white;
    overflow:hidden;
}

h1{
    margin-top:80px;
    font-size:25px;
}

p{
    font-size:20px;
}

.ketupat{
    position:absolute;
    top:-60px; /* mula di atas skrin */
    width:40px; /* saiz default, boleh adjust */
    height:40px;
    pointer-events:none;
    animation-name:jatuh;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}

@keyframes jatuh{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<h1>🌙 Selamat Hari Raya 🌙</h1>
<p>Maaf Zahir & Batin 💚</p>

<script>
// buat hujan ketupat dengan PNG
for(let i=0;i<40;i++){
    let img=document.createElement("img");
    img.src="ketupat.png"; // pastikan PNG ada dalam folder sama
    img.className="ketupat";
    img.style.left=Math.random()*100+"%";
    img.style.width=(20+Math.random()*30)+"px"; // saiz random
    img.style.height=img.style.width;
    img.style.animationDuration=(3+Math.random()*5)+"s"; // laju jatuh random
    document.body.appendChild(img);
}
</script>

</body>
</html>
